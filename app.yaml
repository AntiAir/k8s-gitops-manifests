apiVersion: v1
kind: ConfigMap
metadata:
  name: web-html-config
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>K8s 實戰環境第二天2026/6/24 (Wed)小改文字</title>
        <style>
            body { font-family: sans-serif; text-align: center; margin-top: 10%; background-color: #f0f2f5; }
            .card { background: white; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            h1 { color: #ff9900; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🚀 歡迎來到 Kubernetes 實戰環境第二天2026/6/24 (Wed)</h1>
            <p>目前環境設定：<strong style="color: #ff9900;">🚨 V2.0 雲端 GitOps 自動部署版小改文字 🚨</strong></p>
            <p>Pod 運作狀態：正常常駐中</p>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-server
  labels:
    app: my-web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: nginx-container
        image: ghcr.io/antiair/python-flask-app:b88c46fe115c77cd8e2440b209492eb1175c31f6
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: web-html-config
---
apiVersion: v1
kind: Service
metadata:
  name: my-web-service
spec:
  type: NodePort
  selector:
    app: my-web-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
